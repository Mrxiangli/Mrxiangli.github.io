---
layout: single
author_profile: true
classes: 
  - wide
  - photography-layout
title: Photo Album
---

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.4.0/luminous-basic.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.4.0/Luminous.min.js"></script>

<div class="album-container">
  <div id="gallery-container" class="photo-gallery"></div>
</div>

<script>
(function() {
  console.log("Gallery Script Initializing...");

  function initGallery() {
    // Move the back button
    const header = document.querySelector('.page__inner-wrap header');
    if (header && !header.querySelector('.header-btn')) {
      header.classList.add('album-dynamic-header');
      const btn = document.createElement('a');
      btn.href = '{{ "/photography/" | relative_url }}';
      btn.className = 'back-btn header-btn';
      btn.innerHTML = '← Back to Gallery';
      header.appendChild(btn);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const targetFolder = urlParams.get('folder');
    if (!targetFolder) return;

    const rawData = {{ site.data.map_locations | jsonify }};
    const mapLocations = rawData || [];

    try {
      let pageTitle = "Untitled Album";
      const cleanTarget = targetFolder.replace(/^\//, '');
      const match = mapLocations.find(loc => loc.link && loc.link.replace(/^\//, '').includes(cleanTarget));
      if (match) pageTitle = match.title;
      
      if (pageTitle === "Untitled Album") {
        const parts = cleanTarget.split('/');
        const folderName = parts[parts.length - 1] || parts[parts.length - 2]; 
        if (folderName) pageTitle = folderName.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
      }
      const titleEl = document.querySelector('.page__title');
      if (titleEl) titleEl.innerText = pageTitle;
      document.title = pageTitle + " - Photography";
    } catch (err) { console.warn("Title update failed", err); }

    const fetchUrl = '{{ "/assets/photos.json" | relative_url }}?v=' + new Date().getTime();
    fetch(fetchUrl)
      .then(response => {
        if (!response.ok) throw new Error("Photos data not found at " + fetchUrl);
        return response.json();
      })
      .then(data => {
        const container = document.getElementById('gallery-container');
        if (!container) return;
        
        const cleanParam = targetFolder.toLowerCase().replace(/^\//, '');
        const albumImages = data.filter(img => img.path && img.path.toLowerCase().replace(/^\//, '').includes(cleanParam));

        if (albumImages.length === 0) {
          container.innerHTML = "<p>No photos found in folder: " + targetFolder + "</p>";
          return;
        }

        albumImages.forEach(img => {
          const photoDiv = document.createElement('div');
          photoDiv.className = 'photo';
          const link = document.createElement('a');
          const correctPath = img.path.startsWith('/') ? '{{ "" | relative_url }}' + img.path : '{{ "/" | relative_url }}' + img.path;
          link.href = correctPath;
          link.className = 'gallery-link';
          const imgTag = document.createElement('img');
          imgTag.src = correctPath;
          imgTag.loading = "lazy";
          link.appendChild(imgTag);
          photoDiv.appendChild(link);
          container.appendChild(photoDiv);
        });

        if (typeof LuminousGallery !== 'undefined') {
          new LuminousGallery(document.querySelectorAll(".gallery-link"));
        }
      })
      .catch(err => {
        console.error('Gallery Load Error:', err);
        const container = document.getElementById('gallery-container');
        if (container) container.innerHTML = `<p>Error: ${err.message}</p>`;
      });
  }

  // Run immediately and also on load to be safe
  initGallery();
  window.addEventListener('load', initGallery);
})();
</script>
